spring.config.import=optional:file:./application-local.properties
server.port=8081
spring.application.name=dailyView
spring.flyway.locations=classpath:db/migration
app.http-client.proxy.enabled=true
app.http-client.proxy.host=localhost
app.http-client.proxy.port=7897
app.connectivity.health.timeout-seconds=15
app.connectivity.health.chainbase-sample-chain-id=56
app.connectivity.health.chainbase-sample-contract-address=0x92aa03137385f18539301349dcfc9ebc923ffb10

app.screener.alpha-futures.binance-alpha-base-url=https://www.binance.com
app.screener.alpha-futures.binance-futures-base-url=https://fapi.binance.com
app.screener.alpha-futures.chainbase-base-url=https://api.chainbase.online
app.screener.alpha-futures.chainbase-api-key=demo
app.screener.alpha-futures.min-open-interest-usdt=5000000
app.screener.alpha-futures.max-monthly-pump-pct=500
app.screener.alpha-futures.min-top10-holding-ratio-pct=90
app.screener.alpha-futures.min-weekly-average-oi-ratio=1.5
app.screener.alpha-futures.min-weekly-peak-oi-ratio=2.0
app.screener.alpha-futures.current-oi-period=5m
app.screener.alpha-futures.oi-history-period=1d
app.screener.alpha-futures.price-kline-interval=1d
app.screener.alpha-futures.monthly-kline-limit=30
app.screener.alpha-futures.oi-history-limit=30
app.screener.alpha-futures.recent-window-days=7
app.screener.alpha-futures.top-holder-limit=10
app.screener.alpha-futures.exclude-fully-delisted=true
app.screener.alpha-futures.exclude-offsell=true
app.screener.alpha-futures.refresh-enabled=true
app.screener.alpha-futures.refresh-cron=0 0 * * * *
app.screener.alpha-futures.refresh-zone=Asia/Shanghai
app.screener.alpha-futures.refresh-run-on-startup=true
