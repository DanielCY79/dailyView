<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Futures Monitor</title>
    <style>
        :root {
            --bg: #09131a;
            --panel: rgba(10, 24, 32, 0.78);
            --line: rgba(132, 196, 219, 0.16);
            --text: #eff8fb;
            --muted: #92afbc;
            --accent: #6de0d3;
            --warn: #f6b25f;
            --danger: #ff7b72;
            --ok: #7ce38b;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Segoe UI Variable", "IBM Plex Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 115, 133, 0.38), transparent 28%),
                radial-gradient(circle at top right, rgba(246, 178, 95, 0.16), transparent 22%),
                linear-gradient(160deg, #071017 0%, #0a151d 55%, #08121a 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.22));
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1540px;
            margin: 0 auto;
            padding: 28px 24px 40px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
            margin-bottom: 22px;
        }

        .hero-card,
        .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .hero-card {
            padding: 24px;
            border-radius: 28px;
        }

        .hero-card h1 {
            margin: 0 0 12px;
            font-family: "Bahnschrift", "Aptos Display", "Segoe UI Variable", sans-serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: 0.02em;
        }

        .hero-card p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.65;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .button,
        .ghost-button {
            border-radius: 999px;
            border: 1px solid rgba(109, 224, 211, 0.28);
            padding: 11px 16px;
            font: inherit;
        }

        .button {
            cursor: pointer;
            color: #041317;
            background: linear-gradient(135deg, #8ef0e0, #5ad7c7);
            box-shadow: 0 12px 28px rgba(46, 196, 182, 0.22);
        }

        .ghost-button {
            color: var(--text);
            background: rgba(12, 28, 38, 0.76);
        }

        .health-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .health-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(132, 196, 219, 0.14);
            background: rgba(8, 21, 28, 0.82);
            color: var(--text);
            font-size: 0.88rem;
        }

        .health-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--muted);
            box-shadow: 0 0 0 4px rgba(146, 175, 188, 0.12);
            flex: 0 0 auto;
        }

        .health-dot.ok {
            background: var(--ok);
            box-shadow: 0 0 0 4px rgba(124, 227, 139, 0.16);
        }

        .health-dot.fail {
            background: var(--danger);
            box-shadow: 0 0 0 4px rgba(255, 123, 114, 0.16);
        }

        .health-dot.warn {
            background: var(--warn);
            box-shadow: 0 0 0 4px rgba(246, 178, 95, 0.16);
        }

        .hero-side {
            display: grid;
            gap: 14px;
        }

        .hero-metric {
            border-radius: 24px;
            padding: 18px 20px;
        }

        .hero-metric .label {
            color: var(--muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .hero-metric .value {
            margin-top: 8px;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .content {
            display: grid;
            gap: 16px;
        }

        .panel {
            border-radius: 24px;
            padding: 18px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .section-title {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sidebar-meta {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-success {
            color: var(--ok);
            border-color: rgba(124, 227, 139, 0.28);
            background: rgba(124, 227, 139, 0.08);
        }

        .status-running {
            color: var(--warn);
            border-color: rgba(246, 178, 95, 0.28);
            background: rgba(246, 178, 95, 0.08);
        }

        .status-failed {
            color: var(--danger);
            border-color: rgba(255, 123, 114, 0.28);
            background: rgba(255, 123, 114, 0.08);
        }

        .table-wrap {
            overflow: auto;
            border-radius: 20px;
            border: 1px solid rgba(132, 196, 219, 0.12);
            background: rgba(6, 15, 20, 0.72);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 880px;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(132, 196, 219, 0.08);
            text-align: left;
            vertical-align: top;
            font-size: 0.9rem;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: rgba(8, 21, 28, 0.95);
            position: sticky;
            top: 0;
        }

        .mono {
            font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
            font-size: 0.84rem;
        }

        .symbol-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            color: var(--accent);
        }

        .symbol-link:hover {
            color: #9ff5ea;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .reason-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .reason-pill {
            border-radius: 999px;
            padding: 5px 10px;
            background: rgba(255, 123, 114, 0.12);
            border: 1px solid rgba(255, 123, 114, 0.16);
            color: #ffb7af;
            font-size: 0.78rem;
        }

        .empty,
        .error {
            padding: 22px;
            border-radius: 18px;
            color: var(--muted);
            background: rgba(10, 22, 29, 0.88);
            border: 1px dashed rgba(132, 196, 219, 0.18);
        }

        .error {
            color: #ffb7af;
            border-color: rgba(255, 123, 114, 0.24);
        }

        @media (max-width: 1200px) {
            .hero {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .page {
                padding: 18px 14px 24px;
            }

            .hero-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <div class="hero-card">
            <h1>Alpha Futures Run Monitor</h1>
            <p>查看最新一轮筛选任务的候选结果、Top 持仓地址，以及外部接口当前是否可用。页面直接读取数据库中的持久化记录，适合快速确认当前筛选输出。</p>
            <div class="hero-actions">
                <button id="refreshRunsButton" class="button" type="button">刷新最新结果</button>
            </div>
            <div id="healthStrip" class="health-strip"></div>
        </div>
        <div class="hero-side">
            <div class="hero-card hero-metric">
                <div class="label">最近一轮状态</div>
                <div class="value" id="latestRunStatus">等待加载</div>
            </div>
            <div class="hero-card hero-metric">
                <div class="label">最近一轮开始时间</div>
                <div class="value" id="latestRunStartedAt">-</div>
            </div>
        </div>
    </section>

    <main class="content">
        <section class="panel">
            <div class="section-header">
                <h2 class="section-title">候选结果</h2>
                <div class="sidebar-meta" id="candidateCountLabel">0 条</div>
            </div>
            <div id="candidateSection"></div>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2 class="section-title">Top 持仓地址</h2>
                <div class="sidebar-meta" id="holderCountLabel">0 条</div>
            </div>
            <div id="holderSection"></div>
        </section>
    </main>
</div>

<script>
    const REJECT_REASON_LABELS = {
        open_interest_below_threshold: "持仓量低于阈值",
        open_interest_unavailable: "持仓量数据不可用",
        monthly_price_data_unavailable: "月度价格数据不可用",
        monthly_price_exploded: "月度涨幅超过阈值",
        weekly_open_interest_not_anomalous: "近一周持仓量异常度不足",
        weekly_open_interest_unavailable: "近一周持仓量数据不可用",
        unsupported_chain_for_holder_scan: "当前链暂不支持持仓扫描",
        holder_concentration_unavailable: "持仓集中度数据不可用",
        holder_supply_inconsistent: "持仓与总供应量数据不一致",
        holder_concentration_below_threshold: "前十持仓占比低于阈值",
        empty_top_holders: "未获取到持仓地址数据",
    };

    const latestRunStatusEl = document.getElementById("latestRunStatus");
    const latestRunStartedAtEl = document.getElementById("latestRunStartedAt");
    const candidateSectionEl = document.getElementById("candidateSection");
    const holderSectionEl = document.getElementById("holderSection");
    const candidateCountLabelEl = document.getElementById("candidateCountLabel");
    const holderCountLabelEl = document.getElementById("holderCountLabel");
    const healthStripEl = document.getElementById("healthStrip");
    const refreshRunsButtonEl = document.getElementById("refreshRunsButton");

    refreshRunsButtonEl.addEventListener("click", refreshDashboard);

    async function refreshDashboard() {
        await Promise.all([loadRuns(), loadHealth()]);
    }

    async function loadRuns() {
        renderDetailLoading();
        try {
            const response = await fetch("/api/monitor/alpha-futures/runs?limit=1");
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const runs = await response.json();
            const latestRun = runs[0];
            latestRunStatusEl.textContent = latestRun ? (latestRun.status || "UNKNOWN") : "暂无数据";
            latestRunStartedAtEl.textContent = latestRun ? formatDate(latestRun.startedAt) : "-";

            if (!latestRun || !latestRun.runId) {
                renderEmptyDetail();
                return;
            }

            await loadRunDetail(latestRun.runId);
        } catch (error) {
            latestRunStatusEl.textContent = "加载失败";
            latestRunStartedAtEl.textContent = "-";
            renderEmptyDetail(`加载运行列表失败：${error.message}`);
        }
    }

    async function loadHealth() {
        renderHealthLoading();
        try {
            const response = await fetch("/actuator/health/connectivity");
            const health = await response.json();
            renderHealth(health);
        } catch (error) {
            renderHealthFallback();
        }
    }

    async function loadRunDetail(runId) {
        renderDetailLoading();

        try {
            const response = await fetch(`/api/monitor/alpha-futures/runs/${runId}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const detail = await response.json();
            renderDetail(detail);
        } catch (error) {
            renderEmptyDetail(`加载运行详情失败：${error.message}`);
        }
    }

    function renderDetailLoading() {
        candidateSectionEl.innerHTML = '<div class="empty">正在加载候选结果...</div>';
        holderSectionEl.innerHTML = '<div class="empty">正在加载持仓明细...</div>';
        candidateCountLabelEl.textContent = "0 条";
        holderCountLabelEl.textContent = "0 条";
    }

    function renderEmptyDetail(message = "当前还没有可展示的运行数据。") {
        candidateSectionEl.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
        holderSectionEl.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
        candidateCountLabelEl.textContent = "0 条";
        holderCountLabelEl.textContent = "0 条";
    }

    function renderDetail(detail) {
        const run = detail.run || {};
        latestRunStatusEl.textContent = run.status || "UNKNOWN";
        latestRunStartedAtEl.textContent = formatDate(run.startedAt);

        renderCandidates(detail.candidates || []);
        renderHolders(detail.topHolders || []);

        if (run.errorMessage) {
            candidateSectionEl.innerHTML = `<div class="error" style="margin-bottom:14px;">本轮错误：${escapeHtml(run.errorMessage)}</div>${candidateSectionEl.innerHTML}`;
        }
    }

    function renderHealthLoading() {
        healthStripEl.innerHTML = [
            healthChip("Binance Alpha", "检查中", "warn"),
            healthChip("Binance Futures", "检查中", "warn"),
            healthChip("Chainbase", "检查中", "warn"),
        ].join("");
    }

    function renderHealth(health) {
        const components = health?.components || {};
        const binanceComponents = components.binance?.components || {};

        const items = [
            {
                label: "Binance Alpha",
                status: normalizeHealthStatus(binanceComponents.alpha?.status),
            },
            {
                label: "Binance Futures",
                status: normalizeHealthStatus(binanceComponents.futures?.status),
            },
            {
                label: "Chainbase",
                status: normalizeHealthStatus(components.chainbase?.status),
            },
        ];

        healthStripEl.innerHTML = items.map(item => {
            if (item.status === "ok") {
                return healthChip(item.label, "可用", "ok");
            }
            if (item.status === "fail") {
                return healthChip(item.label, "异常", "fail");
            }
            return healthChip(item.label, "未知", "warn");
        }).join("");
    }

    function renderHealthFallback() {
        healthStripEl.innerHTML = [
            healthChip("Binance Alpha", "异常", "fail"),
            healthChip("Binance Futures", "异常", "fail"),
            healthChip("Chainbase", "异常", "fail"),
        ].join("");
    }

    function healthChip(label, text, tone) {
        return `
            <div class="health-chip">
                <span class="health-dot ${tone}"></span>
                <span>${escapeHtml(label)}</span>
                <span class="sidebar-meta">${escapeHtml(text)}</span>
            </div>
        `;
    }

    function normalizeHealthStatus(status) {
        const normalized = String(status || "").toLowerCase();
        if (normalized === "up" || normalized === "success") {
            return "ok";
        }
        if (normalized === "down" || normalized === "failed") {
            return "fail";
        }
        return "warn";
    }

    function renderCandidates(candidates) {
        candidateCountLabelEl.textContent = `${candidates.length} 条`;
        if (!candidates.length) {
            candidateSectionEl.innerHTML = '<div class="empty">本轮没有筛选结果明细。</div>';
            return;
        }

        candidateSectionEl.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>交易对</th>
                        <th>Alpha 币种</th>
                        <th>当前 OI</th>
                        <th>月涨幅</th>
                        <th>Top10 占比</th>
                        <th>周均 OI 比</th>
                        <th>周峰值 OI 比</th>
                        <th>通过</th>
                        <th>拒绝原因</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${candidates.map(candidate => `
                        <tr>
                            <td>${renderFuturesSymbolCell(candidate)}</td>
                            <td>${escapeHtml(candidate.alphaSymbol || candidate.cexCoinName || candidate.alphaId || "-")}<br><span class="mono">${escapeHtml(candidate.chainId || "-")}</span></td>
                            <td>${escapeHtml(formatDecimal(candidate.currentOpenInterestUsdt, 2))}</td>
                            <td>${escapeHtml(formatDecimal(candidate.monthlyPumpPct, 2))}%</td>
                            <td>${escapeHtml(formatDecimal(candidate.top10HoldingRatioPct, 2))}%</td>
                            <td>${escapeHtml(formatDecimal(candidate.recentWeekAverageOiRatio, 3))}</td>
                            <td>${escapeHtml(formatDecimal(candidate.recentWeekPeakOiRatio, 3))}</td>
                            <td>${statusPill(candidate.passed ? "SUCCESS" : "FAILED")}</td>
                            <td>${renderReasons(candidate.rejectReasons || [])}</td>
                        </tr>
                    `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderFuturesSymbolCell(candidate) {
        const futuresSymbol = candidate?.futuresSymbol || "";
        const contractAddress = candidate?.contractAddress || "-";
        if (!futuresSymbol) {
            return `<strong>-</strong><br><span class="mono">${escapeHtml(contractAddress)}</span>`;
        }

        return `
            <a class="symbol-link" href="${escapeHtml(buildBinanceFuturesUrl(futuresSymbol))}" target="_blank" rel="noopener noreferrer">
                ${escapeHtml(futuresSymbol)}
            </a>
            <br>
            <span class="mono">${escapeHtml(contractAddress)}</span>
        `;
    }

    function buildBinanceFuturesUrl(futuresSymbol) {
        return `https://www.binance.com/zh-CN/futures/${encodeURIComponent(String(futuresSymbol || "").trim())}`;
    }

    function renderHolders(holders) {
        holderCountLabelEl.textContent = `${holders.length} 条`;
        if (!holders.length) {
            holderSectionEl.innerHTML = '<div class="empty">本轮没有 Top 持仓地址明细。</div>';
            return;
        }

        holderSectionEl.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>交易对</th>
                        <th>Rank</th>
                        <th>地址</th>
                        <th>数量</th>
                        <th>链信息</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${holders.map(holder => `
                        <tr>
                            <td><strong>${escapeHtml(holder.futuresSymbol || holder.alphaSymbol || holder.alphaId || "-")}</strong><br>${escapeHtml(holder.alphaSymbol || "-")}</td>
                            <td>Top ${escapeHtml(String(holder.topN))} / #${escapeHtml(String(holder.rankNo))}</td>
                            <td><span class="mono">${escapeHtml(holder.walletAddress || "-")}</span></td>
                            <td>${escapeHtml(formatDecimal(holder.amount, 6))}</td>
                            <td>${escapeHtml(holder.chainId || "-")}<br><span class="mono">${escapeHtml(holder.contractAddress || "-")}</span></td>
                        </tr>
                    `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderReasons(reasons) {
        if (!reasons.length) {
            return '<span style="color:var(--muted);">-</span>';
        }
        return `<div class="reason-list">${reasons.map(reason => `<span class="reason-pill">${escapeHtml(translateRejectReason(reason))}</span>`).join("")}</div>`;
    }

    function translateRejectReason(reason) {
        const key = String(reason || "").trim();
        return REJECT_REASON_LABELS[key] || key;
    }

    function statusPill(status) {
        return `<span class="status-pill ${statusClass(status)}">${escapeHtml(status || "UNKNOWN")}</span>`;
    }

    function statusClass(status) {
        const normalized = String(status || "").toLowerCase();
        if (normalized === "up" || normalized === "success") {
            return "status-success";
        }
        if (normalized === "running") {
            return "status-running";
        }
        if (normalized === "down" || normalized === "failed") {
            return "status-failed";
        }
        return "";
    }

    function formatDate(value) {
        if (!value) {
            return "-";
        }
        return new Intl.DateTimeFormat("zh-CN", {
            dateStyle: "medium",
            timeStyle: "medium",
            hour12: false,
        }).format(new Date(value));
    }

    function formatDecimal(value, scale) {
        if (value === null || value === undefined || value === "") {
            return "-";
        }
        const number = Number(value);
        if (!Number.isFinite(number)) {
            return String(value);
        }
        return new Intl.NumberFormat("zh-CN", {
            maximumFractionDigits: scale,
            minimumFractionDigits: 0,
        }).format(number);
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    refreshDashboard();
</script>
</body>
</html>
